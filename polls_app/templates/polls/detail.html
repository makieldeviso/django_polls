<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Polls</title>
</head>
<body>
    <h1>Details</h1>
    <p>
        {% if question %}
            {{question.question_text}}
        {% endif %}
    </p>

    <ul>
        {% for choice in question.choice_set.all %}
        <li>
            {{choice.choice_text}}
        </li>
        {% endfor %}
    </ul>

</body>
</html>
